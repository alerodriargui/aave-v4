name: Echidna Enigma Dark Invariants

on:
  push:
    branches:
      - main
  pull_request:

env:
  FOUNDRY_PROFILE: ci

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: aave-v4-invariants-corpus

      - name: Clone Corpus
        run: |
          git clone https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/Enigma-Dark/aave-v4-invariants-corpus.git corpus

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Build contracts
        run: |
          forge build tests/enigma-dark-invariants/Tester.t.sol --build-info

      - name: Cache corpus
        uses: actions/cache@v4
        with:
          path: corpus
          key: corpus-${{ hashFiles('corpus/**') }}
  
      - name: Cache build artifacts
        id: save-build
        uses: actions/cache@v4
        with:
          path: |
            out
            cache
          key: ${{ runner.os }}-foundry-${{ hashFiles('foundry.toml', 'tests/enigma-dark-invariants/**/*.sol') }}

  echidna:
    name: Echidna Enigma Dark Invariants (${{ matrix.mode }})
    runs-on: ubuntu-latest
    needs: setup

    strategy:
      matrix:
        mode: [property, assertion]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Restore corpus
        uses: actions/cache@v4
        with:
          path: corpus
          key: corpus-${{ hashFiles('corpus/**') }}

      - name: Restore build cache
        uses: actions/cache@v4
        with:
          path: |
            out
            cache
          key: ${{ runner.os }}-foundry-${{ hashFiles('foundry.toml', 'tests/enigma-dark-invariants/**/*.sol') }}

      - name: Run Echidna ${{ matrix.mode == 'property' && 'Property' || 'Assertion' }} Mode
        uses: crytic/echidna-action@v2
        with:
          files: .
          contract: Tester
          config: tests/enigma-dark-invariants/_config/echidna_config_ci.yaml
          test-mode: ${{ matrix.mode == 'assertion' && 'assertion' || '' }}