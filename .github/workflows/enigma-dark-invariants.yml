name: Echidna-Invariants Enigma-Dark

on:
  push:
    branches:
      - main
  pull_request:

env:
  FOUNDRY_PROFILE: ci

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    name: Setup
    runs-on: aave-latest
    outputs:
      corpus-sha: ${{ steps.clone-corpus.outputs.sha }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: aave
          repositories: aave-v4-invariants-corpus

      - name: Clone Corpus
        id: clone-corpus
        run: |
          git clone https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/aave/aave-v4-invariants-corpus.git corpus
          echo "sha=$(git -C corpus rev-parse HEAD)" >> $GITHUB_OUTPUT
          
      - name: Cache corpus
        uses: actions/cache@v4
        with:
          path: corpus
          key: corpus-${{ steps.clone-corpus.outputs.sha }}

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Restore build cache
        id: restore-build
        uses: actions/cache@v4
        with:
          path: |
            out
            cache
          key: ${{ runner.os }}-foundry-${{ hashFiles('foundry.toml', 'tests/invariants/**/*.sol') }}

      - name: Build contracts (skip if cache hit)
        if: steps.restore-build.outputs.cache-hit != 'true'
        run: forge build tests/invariants/Tester.t.sol --build-info
  
      - name: Cache build artifacts
        if: steps.restore-build.outputs.cache-hit != 'true'
        id: save-build
        uses: actions/cache@v4
        with:
          path: |
            out
            cache
          key: ${{ runner.os }}-foundry-${{ hashFiles('foundry.toml', 'tests/invariants/**/*.sol') }}

  echidna:
    name: Echidna-Invariants (${{ matrix.mode }}) Enigma-Dark
    runs-on: ubuntu-latest
    needs: setup

    strategy:
      matrix:
        mode: [property, assertion]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Restore corpus
        uses: actions/cache@v4
        with:
          path: corpus
          key: corpus-${{ needs.setup.outputs.corpus-sha }}

      - name: Restore build cache
        uses: actions/cache@v4
        with:
          path: |
            out
            cache
          key: ${{ runner.os }}-foundry-${{ hashFiles('foundry.toml', 'tests/invariants/**/*.sol') }}

      - name: Run Echidna ${{ matrix.mode == 'property' && 'Property' || 'Assertion' }} Mode
        uses: crytic/echidna-action@v2
        with:
          files: .
          contract: Tester
          config: tests/invariants/_config/echidna_config_ci.yaml
          test-mode: ${{ matrix.mode == 'assertion' && 'assertion' || '' }}