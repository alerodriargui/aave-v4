name: Echidna Enigma Dark Invariants

on:
  push:
    branches:
      - main
  pull_request:

env:
  FOUNDRY_PROFILE: ci

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  echidna:
    name: Echidna Enigma Dark Invariants
    runs-on: ubuntu-latest

    strategy:
      matrix:
        mode: [property, assertion] # Define the modes here

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: aave-v4-invariants-corpus

      - name: Clone the private repo into corpus folder
        run: |
          git clone https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/Enigma-Dark/aave-v4-invariants-corpus.git corpus

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Compile contracts
        run: |
          forge build tests/enigma-dark-invariants/Tester.t.sol --build-info

      - name: Run Echidna ${{ matrix.mode == 'property' && 'Property' || 'Assertion' }} Mode
        uses: crytic/echidna-action@v2
        with:
          files: .
          contract: Tester
          config: tests/enigma-dark-invariants/_config/echidna_config_ci.yaml
          crytic-args: --ignore-compile
          test-mode: ${{ matrix.mode == 'assertion' && 'assertion' || '' }}