name: Snapshot to private repo (cross-org)
on:
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: aave-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build snapshot tree
        run: |
          # Clean up any existing snapshot directory from previous runs
          rm -rf /tmp/snap
          mkdir -p /tmp/snap
          git archive --format=tar HEAD | tar -x -C /tmp/snap
          cd /tmp/snap
          # Remove .github directory to avoid workflow permission issues
          rm -rf .github
          git init
          git add .
          git -c user.name="Snapshot Bot" -c user.email="snapshot-bot@local" commit -m "Snapshot: ${GITHUB_SHA}"

      - name: Create GitHub App token for target repo
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: adamavaralabs
          repositories: aave-v4

      - name: Push to snapshot repo (replace everything)
        run: |
          cd /tmp/snap
          git branch -M main
          # Remove any existing remote and add fresh one
          git remote remove origin 2>/dev/null || true
          git remote add origin https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/adamavaralabs/aave-v4.git
          git push origin main --force   # keep a single-commit repo

      - name: Clean up
        if: always()
        run: |
          rm -rf /tmp/snap
