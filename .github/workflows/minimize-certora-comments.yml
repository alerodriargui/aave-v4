name: Minimize Certora Comments

on: status

permissions:
  pull-requests: write

jobs:
  minimize:
    runs-on: ubuntu-latest
    if: >-
      startsWith(github.event.context, 'certora-run/') &&
      github.event.state == 'success'
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const sha = context.payload.sha;
            const { data: pulls } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: sha
            });
            for (const pr of pulls) {
              const { data: reviews } = await github.rest.pulls.listReviews({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number
              });
              const shortSha = sha.substring(0, 8);
              const certoraReviews = reviews.filter(r =>
                r.user.login === 'certora-run[bot]' &&
                r.body.includes('Verified Rules') &&
                r.body.includes(shortSha) &&
                !r.body.includes('<details>')
              );
              for (const review of certoraReviews) {
                // Only wrap if all results are passing (no failures)
                if (review.body.includes(':x:')) {
                  console.log(`Review ${review.id} has failures, skipping`);
                  continue;
                }
                const updated = review.body.replace(
                  /## Verified Rules/,
                  '<details><summary><h2>Verified Rules</h2></summary>'
                ) + '\n\n</details>';
                try {
                  await github.rest.pulls.updateReview({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    pull_number: pr.number,
                    review_id: review.id,
                    body: updated
                  });
                  console.log(`Wrapped review ${review.id} on PR #${pr.number}`);
                } catch (e) {
                  console.log(`Failed to wrap review ${review.id}: ${e.message}`);
                }
              }
            }
