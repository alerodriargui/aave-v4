name: Minimize Certora Comments

on:
  pull_request_review:
    types: [submitted, edited]

permissions:
  pull-requests: write

jobs:
  minimize:
    runs-on: ubuntu-latest
    if: >-
      github.event.review.user.login == 'certora-run[bot]' ||
      (github.event.review.user.type == 'Bot' && contains(github.event.review.body, 'Verified Rules'))
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.review.body || '';
            if (body.includes('<details>')) {
              console.log('Already has spoiler, skipping');
              return;
            }
            const updated = body.replace(
              /## Verified Rules/,
              '<details><summary><h2>Verified Rules</h2></summary>'
            ) + '\n\n</details>';
            try {
              await github.rest.pulls.updateReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                review_id: context.payload.review.id,
                body: updated
              });
              console.log('Wrapped Verified Rules in spoiler');
            } catch (e) {
              console.log(`Failed to wrap comment: ${e.message}`);
            }
